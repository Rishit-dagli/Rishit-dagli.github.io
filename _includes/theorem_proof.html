<div class="theorem-box" style="padding: 0.75em; border: 1px solid var(--theorem-border); margin-bottom: 1em;"{% if include.label %} id="{{ include.label }}"{% endif %}>
    <b>Theorem ({{ include.name }}):</b> {{ include.content | markdownify }}

    <b>Proof:</b> {{ include.proof | markdownify }}
</div>
